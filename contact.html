<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.L.E.N.G — Свяжись с нами</title>
     <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="offer.css">
    <link rel="stylesheet" href="privacy.css">
</head>
<body>

<!-- Основной блок -->
<div class="main-content">
    <!-- Хедер -->
    <header>
        <a href="index.html" class="logo-link">
            <img src="SLENG (черный).png" alt="S.L.E.N.G" class="logo-img">
        </a>
        <button class="cart-btn cart-link">
    Корзина <span id="cartCount">0</span></button>
    </header>

    <div class="crooked-main">   
        <div class="crooked-text">
            поддержка, сотруднечество, любые вопросы либо<br>S.L.E.N.G@icloud.com либо
            <a href="https://t.me/slengsupport" target="_blank" class="crooked-telegram">
                @slengsupport
            </a>
        </div>

        <button class="crooked-back" id="backBtn">
            ↺ вернуться назад
        </button>
    </div>

     <footer>
            <div class="footer-col"></div>
    <div class="footer-col social-dropdown">
        <button class="footer-btn social-trigger" id="socialTrigger">Соц сети ▼</button>
        <div class="social-dropdown-menu" id="socialMenu">
            <a href="https://instagram.com/sleng" target="_blank" class="social-link">Instagram</a>
            <a href="https://tiktok.com/@sleng" target="_blank" class="social-link">TikTok</a>
            <a href="https://t.me/sleng" target="_blank" class="social-link">Telegram</a>
        </div>
    </div>
    <div class="footer-col">
        <button class="footer-btn" data-footer="about">О нас</button>
        <button class="footer-btn" data-footer="contact">Свяжись с нами</button>
        <button class="footer-btn" data-footer="offer">Публичная оферта</button>
        <button class="footer-btn" data-footer="privacy">Политика конфиденциальности</button>
        <a class=""></a>
        </div>
    </footer>
</div>
</div>
<!-- Затемнение фона -->
<div class="cart-overlay" id="cartOverlay"></div>

<!-- Выезжающая корзина -->
<aside class="cart-sidebar" id="cartSidebar">
    <!-- Шапка -->
    <div class="cart-header">
        <h2 class="cart-title">Ваша корзина</h2>
        <button class="cart-close" id="closeCartBtn">закрыть</button>
    </div>

    <!-- Список товаров -->
    <div class="cart-items" id="cartItems"></div>

    <!-- Нижняя часть -->
    <div class="cart-footer">
        <div class="cart-total">
            Итого: <span id="cartTotal">0 ₽</span>
        </div>

        <button class="cart-checkout-btn" id="checkoutBtn">
            Оформить заказ
        </button>
    </div>
</aside>
<script src="script.js"></script>
<script src="contact.js"></script>
</body>
</html>
