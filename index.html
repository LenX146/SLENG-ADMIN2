<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save.Life.Energy.New.Generation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu-overlay" id="menuOverlay"></div>
<div class="side-menu" id="sideMenu">
    <div class="menu-header">
        <h3>Каталог</h3>
        <button class="close-menu" id="closeMenuBtn">Назад</button>
    </div>
    <ul class="menu-list">
        <li><button data-category="upper">Верхняя одежда</button></li>
        <li><button data-category="lower">Нижняя одежда</button></li>
        <li><button data-category="accessories">Аксессуары</button></li>
    </ul>
</div>

<div class="main-content">
    <header>
        <button class="burger-btn" id="burgerBtn">☰</button>
        <a href="index.html" class="logo-link">
            <img src="SLENG (черный).png" alt="S.L.E.N.G" class="logo-img">
        </a>
    <button class="cart-btn cart-link">Корзина<span id="cartCount">0</span>
</button>
    </header>

    <section class="catalog" id="catalog"></section>

    <footer>
        <div class="footer-col"></div>
        <div class="footer-col social-dropdown">
            <button class="footer-btn social-trigger">Соц сети ▼</button>
            <div class="social-dropdown-menu">
                <a href="https://instagram.com/sleng" target="_blank" class="social-link">Inst*</a>
                <a href="https://tiktok.com/@sleng" target="_blank" class="social-link">TikTok</a>
                <a href="https://t.me/sleng" target="_blank" class="social-link">(→_→) Telegram</a>
            </div>
        </div>
        <div class="footer-col">
            <button class="footer-btn" data-footer="about">О нас</button>
            <button class="footer-btn" data-footer="contact">Свяжись с нами</button>
            <button class="footer-btn" data-footer="offer">Публичная оферта</button>
            <button class="footer-btn" data-footer="privacy">Политика конфиденциальности</button>
        </div>
    </footer>
</div>

<!-- Затемнение фона -->
<div class="cart-overlay" id="cartOverlay"></div>

<!-- Выезжающая корзина -->
<aside class="cart-sidebar" id="cartSidebar">
    <!-- Шапка -->
    <div class="cart-header">
        <h2 class="cart-title">Ваша корзина</h2>
        <button class="cart-close" id="closeCartBtn">закрыть</button>
    </div>

    <!-- Список товаров -->
    <div class="cart-items" id="cartItems"></div>

    <!-- Нижняя часть -->
    <div class="cart-footer">
        <div class="cart-total">
            Итого: <span id="cartTotal">0 ₽</span>
        </div>

        <button class="cart-checkout-btn" id="checkoutBtn">
    Оформить заказ</button>
    </div>
</aside>

<script src="script.js"></script>
</body>
</html>
